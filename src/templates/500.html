{% extends 'base.html' %}

{% block title %}500 - 服务器错误 - 重庆师范大学师能素质协会{% endblock %}

{% block content %}
<div class="container text-center py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-body p-5">
                    <h1 class="display-1 text-danger mb-4">500</h1>
                    <img src="https://http.cat/500" alt="500 错误猫咪" class="img-fluid rounded mb-4" style="max-width: 400px;">
                    <h2 class="mb-4">哎呀，出错啦！</h2>
                    <p class="lead mb-4">{{ error_message|default('服务器遇到了一个意外情况，无法完成您的请求。') }}</p>
                    <p class="text-muted mb-4">我们的技术团队正在努力修复这个问题，请稍后再试。</p>
                    <div class="mt-5">
                        <a href="{{ url_for('main.index') }}" class="btn btn-primary btn-lg">
                            <i class="fas fa-home me-2"></i>返回首页
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
